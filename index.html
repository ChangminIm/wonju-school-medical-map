<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>초중등학교-의료기관 접근성 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>
<script src="data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;display:flex;height:100vh;overflow:hidden}
#map{flex:1;z-index:0}
#sidebar{width:380px;min-width:380px;background:#fff;display:flex;flex-direction:column;border-left:1px solid #ddd;z-index:1;overflow:hidden}
#sidebar.collapsed{margin-right:-380px;transition:margin-right .3s}
#sidebar-toggle{position:absolute;right:380px;top:50%;z-index:1000;transform:translateY(-50%);width:28px;height:56px;background:#fff;border:1px solid #ccc;border-right:none;border-radius:8px 0 0 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#555;transition:right .3s}
#sidebar.collapsed ~ #sidebar-toggle{right:0}

.region-tabs{display:flex;border-bottom:2px solid #eee;flex-shrink:0}
.region-tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.region-tab.active{color:#4a90d9;border-bottom-color:#4a90d9;background:#f8fbff}

.sidebar-header{padding:12px 20px 10px;border-bottom:1px solid #eee;flex-shrink:0}
.sidebar-header h2{font-size:15px;color:#333;margin-bottom:6px}
.search-box{position:relative;margin-bottom:6px}
.search-box input{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:#4a90d9}
#searchResults{list-style:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ddd;border-top:none;border-radius:0 0 6px 6px;max-height:240px;overflow-y:auto;z-index:10;display:none;box-shadow:0 4px 12px rgba(0,0,0,.1)}
#searchResults li{padding:8px 12px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f0f0f0}
#searchResults li:hover{background:#f0f5ff}
#searchResults .sr-tag{font-size:11px;padding:1px 6px;border-radius:3px;color:#fff;white-space:nowrap;margin-left:8px}
.n-selector{display:flex;align-items:center;gap:8px;margin-top:6px}
.n-selector label{font-size:12px;color:#555}
.n-selector select{font-size:12px;padding:2px 6px;border:1px solid #ccc;border-radius:4px}
.radius-toggle{display:flex;align-items:center;gap:8px;margin-top:6px}
.radius-toggle label{font-size:12px;color:#555;cursor:pointer;display:flex;align-items:center;gap:4px}

.filter-section{padding:12px 20px;border-bottom:1px solid #eee;flex-shrink:0;max-height:280px;overflow-y:auto}
.filter-section h3{font-size:13px;color:#666;margin-bottom:6px}
.filter-group{display:flex;flex-wrap:wrap;gap:4px 10px;margin-bottom:8px}
.filter-group label{font-size:12px;color:#444;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.filter-group input[type=checkbox]{accent-color:#4a90d9;width:14px;height:14px}

.count-row{padding:8px 20px;border-bottom:1px solid #eee;flex-shrink:0;font-size:12px;color:#888;display:flex;gap:16px}
.count-row span{display:flex;align-items:center;gap:4px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}

#result-panel{flex:1;overflow-y:auto;padding:0}
.result-header{padding:12px 20px 8px;font-size:14px;font-weight:600;color:#333;position:sticky;top:0;background:#fff;border-bottom:1px solid #eee;z-index:1}
.result-list{list-style:none}
.result-item{padding:10px 20px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .15s;display:flex;justify-content:space-between;align-items:center}
.result-item:hover{background:#f5f8ff}
.result-name{font-size:13px;color:#333;flex:1}
.result-type{font-size:11px;color:#888;margin:0 8px}
.result-dist{font-size:13px;font-weight:600;color:#4a90d9;white-space:nowrap}
.result-empty{padding:40px 20px;text-align:center;color:#aaa;font-size:13px}

.legend{position:absolute;bottom:24px;left:12px;z-index:1000;background:rgba(255,255,255,.95);padding:12px 16px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.15);font-size:12px;max-width:200px}
.legend h4{margin-bottom:6px;font-size:13px;color:#333}
.legend-item{display:flex;align-items:center;gap:6px;margin:3px 0}
.legend-icon{width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 2px rgba(0,0,0,.3)}

.info-popup{min-width:160px}
.info-popup h3{font-size:14px;margin:0 0 6px;color:#222}
.info-popup table{width:100%;margin-top:8px;border-collapse:collapse}
.info-popup td{padding:3px 6px;font-size:12px;border-bottom:1px solid #f0f0f0}
.info-popup td:first-child{color:#666}
.info-popup td:last-child{text-align:right;color:#222}
.popup-badge{display:inline-block;font-size:11px;color:#fff;padding:1px 7px;border-radius:3px;margin:0 2px 4px 0}
</style>
</head>
<body>
<div id="map"></div>

<div id="sidebar">
  <div class="region-tabs">
    <div class="region-tab active" data-region="all">전체</div>
    <div class="region-tab" data-region="wonju">원주시</div>
    <div class="region-tab" data-region="yongin">용인시</div>
  </div>
  <div class="sidebar-header">
    <h2>초중등학교-의료기관 접근성 지도</h2>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="학교 또는 의료기관 이름 검색..." autocomplete="off">
      <ul id="searchResults"></ul>
    </div>
    <div class="n-selector">
      <label>표시 개수:</label>
      <select id="topN">
        <option value="3">가까운 3개</option>
        <option value="5" selected>가까운 5개</option>
        <option value="10">가까운 10개</option>
        <option value="all">전체</option>
      </select>
    </div>
    <div class="radius-toggle">
      <label><input type="checkbox" id="show1km"> 1km 반경</label>
      <label><input type="checkbox" id="show3km"> 3km 반경</label>
    </div>
  </div>
  <div class="filter-section">
    <h3>학교급</h3>
    <div class="filter-group" id="school-filters"></div>
    <h3>진료과 분류</h3>
    <div class="filter-group" id="cat-filters"></div>
    <h3>의료기관 종별</h3>
    <div class="filter-group" id="type-filters"></div>
    <div class="filter-group" style="margin-top:6px" id="health-check-group">
      <label><input type="checkbox" id="healthCheckOnly"> <span id="healthCheckLabel">학생건강검진 가능 기관만</span></label>
    </div>
    <div id="care-section">
      <h3>늘봄기관</h3>
      <div class="filter-group" id="care-filters"></div>
    </div>
  </div>
  <div class="count-row" id="count-row"></div>
  <div id="result-panel">
    <div class="result-empty" id="empty-msg">학교를 클릭하면 가까운 의료기관을 표시합니다</div>
    <div class="result-header" id="result-header" style="display:none"></div>
    <ul class="result-list" id="result-list"></ul>
  </div>
</div>

<button id="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('collapsed');setTimeout(()=>map.invalidateSize(),350)">◀</button>

<div class="legend">
  <h4>범례</h4>
  <div class="legend-item"><div style="width:20px;height:20px;background:#2563eb;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;border:1.5px solid #fff;box-shadow:0 0 2px rgba(0,0,0,.3)">🏫</div> 초등학교</div>
  <div class="legend-item"><div style="width:20px;height:20px;background:#7c3aed;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;border:1.5px solid #fff;box-shadow:0 0 2px rgba(0,0,0,.3)">🎓</div> 중학교</div>
  <div class="legend-item"><div class="legend-icon" style="background:#dc2626;width:16px;height:16px"></div> 소아청소년과</div>
  <div class="legend-item"><div class="legend-icon" style="background:#2563eb"></div> 내과</div>
  <div class="legend-item"><div class="legend-icon" style="background:#6b7280"></div> 기타</div>
  <div class="legend-item"><div style="width:20px;height:20px;background:#16a34a;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;border:1.5px solid #fff;box-shadow:0 0 2px rgba(0,0,0,.3)">🧸</div> 늘봄기관</div>
</div>

<script>
const REGION_CENTER = {wonju:[37.342,127.940], yongin:[37.28,127.10], all:[37.31,127.52]};
const REGION_ZOOM = {wonju:12, yongin:12, all:10};
const HEALTH_CHECK_LABEL = {wonju:'학생건강검진 가능 기관만', yongin:'국가건강검진(일반) 기관만', all:'건강검진 가능 기관만 (원주:학생 / 용인:국가일반)'};

let currentRegion = 'all';
let DATA = {schools:[], medical:[]};

const SCHOOL_COLORS = {'초등학교':'#2563eb','중학교':'#7c3aed'};
const CAT_COLORS = {'소아청소년과':'#dc2626','내과':'#2563eb','기타':'#6b7280'};
const CAT_SIZES = {'소아청소년과':18,'내과':16,'기타':12};
const TYPE_GROUPS = {'상급종합/종합병원':['상급종합병원','종합병원'],'병원':['병원','정신병원','요양병원'],'의원':['의원','치과병원','치과의원','한방병원','한의원']};
const CARE_COLOR = '#16a34a';
const CARE_TYPES = ['지역아동센터','다함께돌봄센터','청소년방과후아카데미'];

const map = L.map('map',{zoomControl:false}).setView(REGION_CENTER.all,REGION_ZOOM.all);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'&copy; <a href="https://osm.org/copyright">OpenStreetMap</a>',maxZoom:19
}).addTo(map);

function makeIcon(color,size){
  return L.divIcon({className:'',html:`<div style="width:${size}px;height:${size}px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,iconSize:[size,size],iconAnchor:[size/2,size/2]});
}
function makeSchoolIcon(level){
  const color=SCHOOL_COLORS[level]||'#2563eb';
  const emoji=level==='초등학교'?'🏫':'🎓';
  return L.divIcon({className:'',html:`<div style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;background:${color};border:2px solid #fff;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,.35);font-size:16px;line-height:1">${emoji}</div>`,iconSize:[28,28],iconAnchor:[14,14]});
}
function makeCareIcon(){
  return L.divIcon({className:'',html:`<div style="display:flex;align-items:center;justify-content:center;width:26px;height:26px;background:${CARE_COLOR};border:2px solid #fff;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,.35);font-size:14px;line-height:1">🧸</div>`,iconSize:[26,26],iconAnchor:[13,13]});
}

const _prepared = {};
function ensurePrepared(region){
  if(_prepared[region]) return;
  const d = ALL_DATA[region];
  if(!d.care) d.care=[];
  d.schools.forEach(s=>{s._region=region;if(s.level==='방송통신중')s.level='중학교';});
  d.medical.forEach(m=>{m._region=region;});
  d.care.forEach(c=>{c._region=region;});
  const all=[...d.schools.map((s,i)=>({arr:'schools',i,lat:s.lat,lng:s.lng})),...d.medical.map((m,i)=>({arr:'medical',i,lat:m.lat,lng:m.lng})),...d.care.map((c,i)=>({arr:'care',i,lat:c.lat,lng:c.lng}))];
  const groups={};
  all.forEach(p=>{const k=p.lat.toFixed(5)+','+p.lng.toFixed(5);(groups[k]=groups[k]||[]).push(p);});
  Object.values(groups).forEach(pts=>{
    if(pts.length<2)return;
    const offset=0.0003;
    pts.forEach((p,i)=>{const angle=(2*Math.PI*i)/pts.length;d[p.arr][p.i].lat+=offset*Math.cos(angle);d[p.arr][p.i].lng+=offset*Math.sin(angle);});
  });
  _prepared[region]=true;
}
function prepareData(){
  ensurePrepared('wonju'); ensurePrepared('yongin');
  if(currentRegion==='all'){
    DATA={schools:[...ALL_DATA.wonju.schools,...ALL_DATA.yongin.schools], medical:[...ALL_DATA.wonju.medical,...ALL_DATA.yongin.medical], care:[...ALL_DATA.wonju.care,...ALL_DATA.yongin.care]};
  } else {
    DATA={schools:[...ALL_DATA[currentRegion].schools], medical:[...ALL_DATA[currentRegion].medical], care:[...ALL_DATA[currentRegion].care]};
  }
}

let schoolMarkers=[],medMarkers=[],careMarkers=[],activeLines=[],activeCircles=[],labelMarkers=[],selectedSchool=null;

function buildFilters(){
  const sf=document.getElementById('school-filters');
  sf.innerHTML='';
  [...new Set(DATA.schools.map(s=>s.level))].forEach(lv=>{
    sf.innerHTML+=`<label><input type="checkbox" checked data-school-level="${lv}"> ${lv}</label>`;
  });
  const cf=document.getElementById('cat-filters');
  cf.innerHTML='';
  ['소아청소년과','내과','기타'].forEach(c=>{
    cf.innerHTML+=`<label><input type="checkbox" checked data-cat="${c}"> ${c}</label>`;
  });
  const tf=document.getElementById('type-filters');
  tf.innerHTML='';
  Object.keys(TYPE_GROUPS).forEach(g=>{
    tf.innerHTML+=`<label><input type="checkbox" checked data-type-group="${g}"> ${g}</label>`;
  });
  document.getElementById('healthCheckLabel').textContent=HEALTH_CHECK_LABEL[currentRegion];
  document.getElementById('healthCheckOnly').checked=false;
  const caref=document.getElementById('care-filters');
  caref.innerHTML='';
  const careTypesPresent=[...new Set(DATA.care.map(c=>c.type))];
  document.getElementById('care-section').style.display=careTypesPresent.length?'':'none';
  CARE_TYPES.filter(t=>careTypesPresent.includes(t)).forEach(t=>{
    caref.innerHTML+=`<label><input type="checkbox" checked data-care-type="${t}"> ${t}</label>`;
  });
  document.querySelectorAll('[data-school-level],[data-cat],[data-type-group],[data-care-type],#healthCheckOnly').forEach(cb=>{
    cb.addEventListener('change',()=>{renderMarkers();if(selectedSchool!==null)selectSchool(selectedSchool);});
  });
}
function getVisibleCareTypes(){const s=new Set();document.querySelectorAll('[data-care-type]:checked').forEach(c=>s.add(c.dataset.careType));return s;}

function getVisibleCats(){const s=new Set();document.querySelectorAll('[data-cat]:checked').forEach(c=>s.add(c.dataset.cat));return s;}
function getVisibleTypes(){const s=new Set();document.querySelectorAll('[data-type-group]:checked').forEach(c=>{TYPE_GROUPS[c.dataset.typeGroup].forEach(t=>s.add(t));});return s;}
function getVisibleSchoolLevels(){const s=new Set();document.querySelectorAll('[data-school-level]:checked').forEach(c=>s.add(c.dataset.schoolLevel));return s;}

function getRadiusSummary(school){
  const schoolRegion=school._region;
  const cats=['소아청소년과','내과','기타'];
  const summary={1:{},3:{},total1:0,total3:0};
  cats.forEach(c=>{summary[1][c]=0;summary[3][c]=0;});
  DATA.medical.forEach(med=>{
    if(schoolRegion && med._region && med._region!==schoolRegion)return;
    const d=turf.distance(turf.point([school.lng,school.lat]),turf.point([med.lng,med.lat]),{units:'kilometers'});
    if(d<=1){summary[1][med.category]=(summary[1][med.category]||0)+1;summary.total1++;}
    if(d<=3){summary[3][med.category]=(summary[3][med.category]||0)+1;summary.total3++;}
  });
  return summary;
}
function radiusSummaryHTML(summary){
  return `<table style="margin-top:8px;width:100%;border-collapse:collapse;font-size:13px"><tr style="border-bottom:1px solid #ddd"><td></td><td style="text-align:center;font-weight:600;color:#3b82f6">1km</td><td style="text-align:center;font-weight:600;color:#f59e0b">3km</td></tr><tr><td style="color:#555;padding:4px 0">소아청소년과</td><td style="text-align:center;padding:4px 0">${summary[1]['소아청소년과']||0}개</td><td style="text-align:center;padding:4px 0">${summary[3]['소아청소년과']||0}개</td></tr><tr><td style="color:#555;padding:4px 0">내과</td><td style="text-align:center;padding:4px 0">${summary[1]['내과']||0}개</td><td style="text-align:center;padding:4px 0">${summary[3]['내과']||0}개</td></tr><tr><td style="color:#555;padding:4px 0">기타</td><td style="text-align:center;padding:4px 0">${summary[1]['기타']||0}개</td><td style="text-align:center;padding:4px 0">${summary[3]['기타']||0}개</td></tr><tr style="border-top:1px solid #ddd;font-weight:600"><td style="padding:4px 0">합계</td><td style="text-align:center;padding:4px 0">${summary.total1}개</td><td style="text-align:center;padding:4px 0">${summary.total3}개</td></tr></table>`;
}

function renderMarkers(){
  schoolMarkers.forEach(m=>map.removeLayer(m));medMarkers.forEach(m=>map.removeLayer(m));careMarkers.forEach(m=>map.removeLayer(m));
  schoolMarkers=[];medMarkers=[];careMarkers=[];
  const visLevels=getVisibleSchoolLevels(),visCats=getVisibleCats(),visTypes=getVisibleTypes(),visCare=getVisibleCareTypes();
  const hcOnly=document.getElementById('healthCheckOnly').checked;

  DATA.schools.forEach((s,i)=>{
    if(!visLevels.has(s.level))return;
    const m=L.marker([s.lat,s.lng],{icon:makeSchoolIcon(s.level)}).addTo(map);
    m.on('click',()=>selectSchool(i));
    m.bindTooltip(s.name,{direction:'top',offset:[0,-8]});
    m.on('popupopen',()=>{const sm=getRadiusSummary(s);m.getPopup().setContent(`<div class="info-popup"><h3>${s.name}</h3><span class="popup-badge" style="background:${SCHOOL_COLORS[s.level]||'#2563eb'}">${s.level}</span><table><tr><td>학생 총계</td><td><strong>${s.students}명</strong></td></tr><tr><td>보건교사</td><td><strong>${s.healthTeacher}명</strong></td></tr><tr><td>영양교사</td><td><strong>${s.nutritionTeacher}명</strong></td></tr></table><div style="margin-top:10px;padding-top:8px;border-top:1px solid #eee"><strong style="font-size:12px">반경 내 의료기관</strong>${radiusSummaryHTML(sm)}</div></div>`);});
    m.bindPopup('',{offset:[0,-10],maxWidth:280});
    schoolMarkers.push(m);
  });
  DATA.medical.forEach((med,i)=>{
    if(!visCats.has(med.category))return;
    if(!visTypes.has(med.type))return;
    if(hcOnly&&!med.healthCheck)return;
    const m=L.marker([med.lat,med.lng],{icon:makeIcon(CAT_COLORS[med.category]||'#6b7280',CAT_SIZES[med.category]||12)}).addTo(map);
    m.bindTooltip(med.name,{direction:'top',offset:[0,-6]});
    const hcBadge=med.healthCheck?`<span class="popup-badge" style="background:#059669">${med._region==='wonju'?'학생건강검진':'국가건강검진'}</span>`:'';
    m.bindPopup(`<div class="info-popup"><h3>${med.name}</h3><span class="popup-badge" style="background:${CAT_COLORS[med.category]}">${med.category}</span><span class="popup-badge" style="background:#555">${med.type}</span>${hcBadge}<table><tr><td>소아청소년과 전문의</td><td><strong>${med.ped}명</strong></td></tr><tr><td>내과 전문의</td><td><strong>${med.inter}명</strong></td></tr></table></div>`,{offset:[0,-6]});
    medMarkers.push(m);
  });
  DATA.care.forEach((c)=>{
    if(!visCare.has(c.type))return;
    const m=L.marker([c.lat,c.lng],{icon:makeCareIcon()}).addTo(map);
    m.bindTooltip(c.name,{direction:'top',offset:[0,-10]});
    const telRow=c.tel?`<tr><td>전화</td><td><strong>${c.tel}</strong></td></tr>`:'';
    const addrRow=c.address?`<tr><td>주소</td><td style="text-align:right">${c.address}</td></tr>`:'';
    m.bindPopup(`<div class="info-popup"><h3>${c.name}</h3><span class="popup-badge" style="background:${CARE_COLOR}">${c.type}</span><table>${addrRow}${telRow}</table></div>`,{offset:[0,-10],maxWidth:280});
    careMarkers.push(m);
  });
  document.getElementById('count-row').innerHTML=`<span><span class="dot" style="background:#2563eb"></span> 학교 ${schoolMarkers.length}개</span><span><span class="dot" style="background:#ea580c"></span> 의료기관 ${medMarkers.length}개</span><span><span class="dot" style="background:#16a34a"></span> 늘봄 ${careMarkers.length}개</span>`;
}

function clearSelection(){
  activeLines.forEach(l=>map.removeLayer(l));activeCircles.forEach(c=>map.removeLayer(c));labelMarkers.forEach(m=>map.removeLayer(m));
  activeLines=[];activeCircles=[];labelMarkers=[];selectedSchool=null;
  document.getElementById('result-header').style.display='none';
  document.getElementById('result-list').innerHTML='';
  document.getElementById('empty-msg').style.display='';
}

function selectSchool(idx){
  clearSelection();selectedSchool=idx;
  const school=DATA.schools[idx];
  const visCats=getVisibleCats(),visTypes=getVisibleTypes();
  const hcOnly=document.getElementById('healthCheckOnly').checked;
  let dists=[];
  const schoolRegion=school._region;
  DATA.medical.forEach((med,i)=>{
    if(schoolRegion && med._region && med._region!==schoolRegion)return;
    if(!visCats.has(med.category))return;
    if(!visTypes.has(med.type))return;
    if(hcOnly&&!med.healthCheck)return;
    dists.push({idx:i,dist:turf.distance(turf.point([school.lng,school.lat]),turf.point([med.lng,med.lat]),{units:'kilometers'}),...med});
  });
  dists.sort((a,b)=>a.dist-b.dist);
  const topNVal=document.getElementById('topN').value;
  const showDists=topNVal==='all'?dists:dists.slice(0,parseInt(topNVal));

  if(document.getElementById('show3km').checked){activeCircles.push(L.circle([school.lat,school.lng],{radius:3000,color:'#f59e0b',weight:2.5,fillColor:'#f59e0b',fillOpacity:0.08,dashArray:'8 6'}).addTo(map));}
  if(document.getElementById('show1km').checked){activeCircles.push(L.circle([school.lat,school.lng],{radius:1000,color:'#3b82f6',weight:2.5,fillColor:'#3b82f6',fillOpacity:0.1,dashArray:'8 6'}).addTo(map));}

  const colors=['#dc2626','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#6366f1','#f43f5e'];
  showDists.forEach((item,rank)=>{
    const c=colors[rank%colors.length];
    activeLines.push(L.polyline([[school.lat,school.lng],[item.lat,item.lng]],{color:c,weight:2.5,opacity:0.8,dashArray:'6 4'}).addTo(map));
    const distText=item.dist<1?(item.dist*1000).toFixed(0)+'m':item.dist.toFixed(2)+'km';
    labelMarkers.push(L.marker([(school.lat+item.lat)/2,(school.lng+item.lng)/2],{icon:L.divIcon({className:'dist-label',html:`<span style="background:rgba(255,255,255,.95);padding:2px 6px;border-radius:4px;font-size:12px;color:#333;font-weight:700;white-space:nowrap;border:1.5px solid ${c};box-shadow:0 1px 3px rgba(0,0,0,.2)">${distText}</span>`,iconSize:[0,0],iconAnchor:[0,0]}),interactive:false,zIndexOffset:1000}).addTo(map));
  });

  document.getElementById('empty-msg').style.display='none';
  const hdr=document.getElementById('result-header');hdr.style.display='';
  hdr.textContent=school.name;
  const list=document.getElementById('result-list');list.innerHTML='';
  const secTitle=document.createElement('li');
  secTitle.style.cssText='padding:10px 20px;font-size:13px;font-weight:600;color:#333;background:#f8fafc;border-bottom:1px solid #eee';
  secTitle.textContent=`📋 가까운 의료기관 (${showDists.length}개)`;
  list.appendChild(secTitle);
  showDists.forEach((item,rank)=>{
    const li=document.createElement('li');li.className='result-item';
    li.innerHTML=`<span class="result-name">${rank+1}. ${item.name}</span><span class="result-type">${item.category} · ${item.type}</span><span class="result-dist">${item.dist<1?(item.dist*1000).toFixed(0)+'m':item.dist.toFixed(2)+'km'}</span>`;
    li.addEventListener('click',()=>map.flyTo([item.lat,item.lng],15,{duration:0.5}));
    li.addEventListener('mouseenter',()=>{if(activeLines[rank])activeLines[rank].setStyle({weight:5,opacity:1});});
    li.addEventListener('mouseleave',()=>{if(activeLines[rank])activeLines[rank].setStyle({weight:2.5,opacity:0.8});});
    list.appendChild(li);
  });
  const rSummary=getRadiusSummary(school);
  const summaryLi=document.createElement('li');
  summaryLi.style.cssText='padding:14px 20px;border-top:2px solid #eee;background:#f8fafc';
  summaryLi.innerHTML=`<div style="font-size:13px;font-weight:600;color:#333;margin-bottom:4px">📊 반경 내 전체 의료기관 현황</div>${radiusSummaryHTML(rSummary)}`;
  list.appendChild(summaryLi);
  const bounds=L.latLngBounds([[school.lat,school.lng]]);
  showDists.slice(0,5).forEach(item=>bounds.extend([item.lat,item.lng]));
  map.flyToBounds(bounds.pad(0.3),{duration:0.5});
}

document.getElementById('topN').addEventListener('change',()=>{if(selectedSchool!==null)selectSchool(selectedSchool);});
document.getElementById('show1km').addEventListener('change',()=>{if(selectedSchool!==null)selectSchool(selectedSchool);});
document.getElementById('show3km').addEventListener('change',()=>{if(selectedSchool!==null)selectSchool(selectedSchool);});
map.on('click',e=>{if(!e.originalEvent.target.closest('.leaflet-marker-icon'))clearSelection();});

function switchRegion(region){
  if(region===currentRegion)return;
  currentRegion=region;
  document.querySelectorAll('.region-tab').forEach(t=>t.classList.toggle('active',t.dataset.region===region));
  clearSelection();
  prepareData();
  buildFilters();
  renderMarkers();
  map.setView(REGION_CENTER[region],REGION_ZOOM[region]);
}
document.querySelectorAll('.region-tab').forEach(t=>t.addEventListener('click',()=>switchRegion(t.dataset.region)));

const searchInput=document.getElementById('searchInput');
const searchResults=document.getElementById('searchResults');
function doSearch(q){
  searchResults.innerHTML='';
  if(!q){searchResults.style.display='none';return;}
  q=q.toLowerCase();
  const matches=[];
  const regionLabel={wonju:'원주',yongin:'용인'};
  DATA.schools.forEach((s,i)=>{if(s.name.toLowerCase().includes(q))matches.push({name:s.name,tag:(currentRegion==='all'?'['+regionLabel[s._region]+'] ':'')+s.level,tagColor:SCHOOL_COLORS[s.level]||'#2563eb',type:'school',idx:i,lat:s.lat,lng:s.lng});});
  DATA.medical.forEach((m,i)=>{if(m.name.toLowerCase().includes(q))matches.push({name:m.name,tag:(currentRegion==='all'?'['+regionLabel[m._region]+'] ':'')+m.category,tagColor:CAT_COLORS[m.category]||'#6b7280',type:'medical',idx:i,lat:m.lat,lng:m.lng});});
  DATA.care.forEach((c,i)=>{if(c.name.toLowerCase().includes(q))matches.push({name:c.name,tag:(currentRegion==='all'?'['+regionLabel[c._region]+'] ':'')+'늘봄',tagColor:CARE_COLOR,type:'care',idx:i,lat:c.lat,lng:c.lng});});
  if(!matches.length){searchResults.innerHTML='<li style="color:#aaa;pointer-events:none">검색 결과 없음</li>';searchResults.style.display='block';return;}
  matches.slice(0,20).forEach(item=>{
    const li=document.createElement('li');
    li.innerHTML=`<span>${item.name}</span><span class="sr-tag" style="background:${item.tagColor}">${item.tag}</span>`;
    li.addEventListener('click',()=>{searchResults.style.display='none';searchInput.value=item.name;map.flyTo([item.lat,item.lng],16,{duration:0.5});if(item.type==='school')selectSchool(item.idx);});
    searchResults.appendChild(li);
  });
  searchResults.style.display='block';
}
searchInput.addEventListener('input',e=>doSearch(e.target.value.trim()));
searchInput.addEventListener('focus',()=>{if(searchInput.value.trim())doSearch(searchInput.value.trim());});
document.addEventListener('click',e=>{if(!e.target.closest('.search-box'))searchResults.style.display='none';});

prepareData();
buildFilters();
renderMarkers();
</script>
</body>
</html>
