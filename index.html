<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원주시 초중등학교-의료기관 접근성 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;display:flex;height:100vh;overflow:hidden}
#map{flex:1;z-index:0}

#sidebar{
  width:380px;min-width:380px;background:#fff;
  display:flex;flex-direction:column;
  border-left:1px solid #ddd;
  transition:margin-right .3s;
  z-index:1;
  overflow:hidden;
}
#sidebar.collapsed{margin-right:-380px}

#sidebar-toggle{
  position:absolute;right:380px;top:50%;z-index:1000;
  transform:translateY(-50%);
  width:28px;height:56px;
  background:#fff;border:1px solid #ccc;border-right:none;
  border-radius:8px 0 0 8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#555;
  transition:right .3s;
}
#sidebar.collapsed ~ #sidebar-toggle{right:0}

.sidebar-header{
  padding:16px 20px 12px;border-bottom:1px solid #eee;
  flex-shrink:0;
}
.sidebar-header h2{font-size:15px;color:#333;margin-bottom:8px}

.search-box{position:relative;margin-bottom:6px}
.search-box input{
  width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;
  font-size:13px;outline:none;transition:border-color .2s;
}
.search-box input:focus{border-color:#4a90d9}
#searchResults{
  list-style:none;position:absolute;top:100%;left:0;right:0;
  background:#fff;border:1px solid #ddd;border-top:none;border-radius:0 0 6px 6px;
  max-height:240px;overflow-y:auto;z-index:10;display:none;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}
#searchResults li{
  padding:8px 12px;font-size:13px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid #f0f0f0;
}
#searchResults li:hover{background:#f0f5ff}
#searchResults .sr-tag{
  font-size:11px;padding:1px 6px;border-radius:3px;color:#fff;white-space:nowrap;margin-left:8px;
}

.filter-section{
  padding:12px 20px;border-bottom:1px solid #eee;flex-shrink:0;
  max-height:260px;overflow-y:auto;
}
.filter-section h3{font-size:13px;color:#666;margin-bottom:8px}
.filter-group{display:flex;flex-wrap:wrap;gap:4px 10px;margin-bottom:8px}
.filter-group label{font-size:12px;color:#444;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.filter-group input[type=checkbox]{accent-color:#4a90d9;width:14px;height:14px}

.count-row{
  padding:10px 20px;border-bottom:1px solid #eee;flex-shrink:0;
  font-size:12px;color:#888;display:flex;gap:16px;
}
.count-row span{display:flex;align-items:center;gap:4px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}

#result-panel{flex:1;overflow-y:auto;padding:0}
.result-header{
  padding:14px 20px 10px;font-size:14px;font-weight:600;color:#333;
  position:sticky;top:0;background:#fff;border-bottom:1px solid #eee;z-index:1;
}
.result-list{list-style:none}
.result-item{
  padding:10px 20px;border-bottom:1px solid #f0f0f0;
  cursor:pointer;transition:background .15s;
  display:flex;justify-content:space-between;align-items:center;
}
.result-item:hover{background:#f5f8ff}
.result-item.active{background:#e8f0fe}
.result-name{font-size:13px;color:#333;flex:1}
.result-type{font-size:11px;color:#888;margin:0 8px}
.result-dist{font-size:13px;font-weight:600;color:#4a90d9;white-space:nowrap}
.result-empty{padding:40px 20px;text-align:center;color:#aaa;font-size:13px}

.n-selector{display:flex;align-items:center;gap:8px;margin-top:8px}
.n-selector label{font-size:12px;color:#555}
.n-selector select{font-size:12px;padding:2px 6px;border:1px solid #ccc;border-radius:4px}

.radius-toggle{display:flex;align-items:center;gap:8px;margin-top:6px}
.radius-toggle label{font-size:12px;color:#555;cursor:pointer;display:flex;align-items:center;gap:4px}

.legend{
  position:absolute;bottom:24px;left:12px;z-index:1000;
  background:rgba(255,255,255,.95);padding:12px 16px;border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);font-size:12px;
  max-width:200px;
}
.legend h4{margin-bottom:6px;font-size:13px;color:#333}
.legend-item{display:flex;align-items:center;gap:6px;margin:3px 0}
.legend-icon{width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 2px rgba(0,0,0,.3)}

.school-popup{text-align:center}
.school-popup h3{font-size:14px;margin-bottom:4px}
.school-popup p{font-size:12px;color:#666;margin-bottom:6px}
.school-popup button{
  background:#4a90d9;color:#fff;border:none;padding:6px 14px;
  border-radius:4px;cursor:pointer;font-size:12px;
}
.school-popup button:hover{background:#3a7bc8}
</style>
</head>
<body>

<div id="map"></div>

<div id="sidebar">
  <div class="sidebar-header">
    <h2>원주시 학교-의료기관 접근성</h2>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="학교 또는 의료기관 이름 검색..." autocomplete="off">
      <ul id="searchResults"></ul>
    </div>
    <div class="n-selector">
      <label>표시 개수:</label>
      <select id="topN">
        <option value="3">가까운 3개</option>
        <option value="5" selected>가까운 5개</option>
        <option value="10">가까운 10개</option>
        <option value="all">전체</option>
      </select>
    </div>
    <div class="radius-toggle">
      <label><input type="checkbox" id="show1km"> 1km 반경</label>
      <label><input type="checkbox" id="show3km"> 3km 반경</label>
    </div>
  </div>

  <div class="filter-section">
    <h3>학교급</h3>
    <div class="filter-group" id="school-filters"></div>
    <h3>의료기관 종별</h3>
    <div class="filter-group" id="med-filters"></div>
    <div class="filter-group" style="margin-top:6px">
      <label><input type="checkbox" id="healthCheckOnly"> 학생건강검진 가능 기관만</label>
    </div>
  </div>

  <div class="count-row" id="count-row"></div>

  <div id="result-panel">
    <div class="result-empty" id="empty-msg">학교를 클릭하면 가까운 의료기관을 표시합니다</div>
    <div class="result-header" id="result-header" style="display:none"></div>
    <ul class="result-list" id="result-list"></ul>
  </div>
</div>

<button id="sidebar-toggle" onclick="toggleSidebar()">◀</button>

<div class="legend">
  <h4>범례</h4>

  <div class="legend-item"><div style="width:20px;height:20px;background:#7c3aed;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;border:1.5px solid #fff;box-shadow:0 0 2px rgba(0,0,0,.3)">🎓</div> 중학교</div>
  <div class="legend-item"><div class="legend-icon" style="background:#dc2626;width:16px;height:16px"></div> 종합/상급종합병원</div>
  <div class="legend-item"><div class="legend-icon" style="background:#f97316"></div> 병원/의원</div>
  <div class="legend-item"><div class="legend-icon" style="background:#a855f7"></div> 정신/요양병원</div>
  <div class="legend-item"><div class="legend-icon" style="background:#059669"></div> 치과</div>
  <div class="legend-item"><div class="legend-icon" style="background:#d97706"></div> 한방</div>
</div>

(function offsetOverlaps(){
  const all = [...DATA.schools.map((s,i)=>({arr:'schools',i,lat:s.lat,lng:s.lng})),
               ...DATA.medical.map((m,i)=>({arr:'medical',i,lat:m.lat,lng:m.lng}))];
  const key = p => p.lat.toFixed(5)+','+p.lng.toFixed(5);
  const groups = {};
  all.forEach(p=>{ const k=key(p); (groups[k]=groups[k]||[]).push(p); });
  Object.values(groups).forEach(pts=>{
    if(pts.length<2) return;
    const offset = 0.0003;
    pts.forEach((p,i)=>{
      const angle = (2*Math.PI*i)/pts.length;
      const item = DATA[p.arr][p.i];
      item.lat += offset*Math.cos(angle);
      item.lng += offset*Math.sin(angle);
    });
  });
})();

  return L.divIcon({
    className:'',
    html:`<div style="width:${size}px;height:${size}px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>`,
    iconSize:[size,size],iconAnchor:[size/2,size/2]
  });
}
function makeSchoolIcon(level){
  const color = SCHOOL_COLORS[level]||'#2563eb';
  const emoji = level==='초등학교' ? '🏫' : '🎓';
  return L.divIcon({
    className:'',
    html:`<div style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;background:${color};border:2px solid #fff;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,.35);font-size:16px;line-height:1">${emoji}</div>`,
    iconSize:[28,28],iconAnchor:[14,14]
  });
}

const schoolLevels = [...new Set(DATA.schools.map(s=>s.level))];
const medTypes = [...new Set(DATA.medical.map(m=>m.type))];

const schoolFiltersEl = document.getElementById('school-filters');
schoolLevels.forEach(lv=>{
  const lb = document.createElement('label');
  lb.innerHTML = `<input type="checkbox" checked data-school-level="${lv}"> ${lv}`;
  schoolFiltersEl.appendChild(lb);
});

const medFiltersEl = document.getElementById('med-filters');
Object.entries(MED_GROUPS).forEach(([group, types])=>{
  const lb = document.createElement('label');
  lb.innerHTML = `<input type="checkbox" checked data-med-group="${group}"> ${group}`;
  medFiltersEl.appendChild(lb);
});

let schoolMarkers = [];
let medMarkers = [];
let activeLines = [];
let activeCircles = [];
let selectedSchool = null;
let labelMarkers = [];

function getVisibleMedTypes(){
  const checked = new Set();
  document.querySelectorAll('[data-med-group]:checked').forEach(cb=>{
    const g = cb.dataset.medGroup;
    MED_GROUPS[g].forEach(t=>checked.add(t));
  });
  return checked;
}
function getVisibleSchoolLevels(){
  const checked = new Set();
  document.querySelectorAll('[data-school-level]:checked').forEach(cb=>{
    checked.add(cb.dataset.schoolLevel);
  });
  return checked;
}

function renderMarkers(){
  schoolMarkers.forEach(m=>map.removeLayer(m));
  medMarkers.forEach(m=>map.removeLayer(m));
  schoolMarkers = [];
  medMarkers = [];

  const visLevels = getVisibleSchoolLevels();
  const visTypes = getVisibleMedTypes();
  const hcOnly = document.getElementById('healthCheckOnly').checked;

  DATA.schools.forEach((s,i)=>{
    if(!visLevels.has(s.level)) return;
    const m = L.marker([s.lat,s.lng],{icon:makeSchoolIcon(s.level)})
      .addTo(map);
    m._schoolIdx = i;
    m.on('click',()=>selectSchool(i));
    m.bindTooltip(s.name,{direction:'top',offset:[0,-8]});
    schoolMarkers.push(m);
  });

  DATA.medical.forEach((med,i)=>{
    if(!visTypes.has(med.type)) return;
    if(hcOnly && !med.healthCheck) return;
    const m = L.marker([med.lat,med.lng],{icon:makeIcon(MED_COLORS[med.type]||'#f97316',MED_SIZES[med.type]||8)})
      .addTo(map);
    m._medIdx = i;
    m.bindTooltip(med.name,{direction:'top',offset:[0,-6]});
    medMarkers.push(m);
  });

  updateCounts();
}

function updateCounts(){
  const row = document.getElementById('count-row');
  row.innerHTML = `
    <span><span class="dot" style="background:#2563eb"></span> 학교 ${schoolMarkers.length}개</span>
    <span><span class="dot" style="background:#ea580c"></span> 의료기관 ${medMarkers.length}개</span>
  `;
}

function clearSelection(){
  activeLines.forEach(l=>map.removeLayer(l));
  activeCircles.forEach(c=>map.removeLayer(c));
  labelMarkers.forEach(m=>map.removeLayer(m));
  activeLines = [];
  activeCircles = [];
  labelMarkers = [];
  selectedSchool = null;
  document.getElementById('result-header').style.display = 'none';
  document.getElementById('result-list').innerHTML = '';
  document.getElementById('empty-msg').style.display = '';
}

function haversine(lat1,lng1,lat2,lng2){
  const from = turf.point([lng1,lat1]);
  const to = turf.point([lng2,lat2]);
  return turf.distance(from,to,{units:'kilometers'});
}

function selectSchool(idx){
  clearSelection();
  selectedSchool = idx;
  const school = DATA.schools[idx];

  const visTypes = getVisibleMedTypes();
  const hcOnly = document.getElementById('healthCheckOnly').checked;

  let dists = [];
  DATA.medical.forEach((med,i)=>{
    if(!visTypes.has(med.type)) return;
    if(hcOnly && !med.healthCheck) return;
    const d = haversine(school.lat,school.lng,med.lat,med.lng);
    dists.push({idx:i,dist:d,...med});
  });
  dists.sort((a,b)=>a.dist-b.dist);

  const topNVal = document.getElementById('topN').value;
  const showDists = topNVal === 'all' ? dists : dists.slice(0, parseInt(topNVal));

  if(document.getElementById('show3km').checked){
    const c = L.circle([school.lat,school.lng],{radius:3000,color:'#f59e0b',weight:2.5,fillColor:'#f59e0b',fillOpacity:0.08,dashArray:'8 6'}).addTo(map);
    activeCircles.push(c);
  }
  if(document.getElementById('show1km').checked){
    const c = L.circle([school.lat,school.lng],{radius:1000,color:'#3b82f6',weight:2.5,fillColor:'#3b82f6',fillOpacity:0.1,dashArray:'8 6'}).addTo(map);
    activeCircles.push(c);
  }

  const colors = ['#dc2626','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#6366f1','#f43f5e'];

  showDists.forEach((item,rank)=>{
    const lineColor = colors[rank % colors.length];
    const line = L.polyline(
      [[school.lat,school.lng],[item.lat,item.lng]],
      {color:lineColor,weight:2.5,opacity:0.8,dashArray:'6 4'}
    ).addTo(map);
    activeLines.push(line);

    const midLat = (school.lat+item.lat)/2;
    const midLng = (school.lng+item.lng)/2;
    const distText = item.dist < 1 ? (item.dist*1000).toFixed(0)+'m' : item.dist.toFixed(2)+'km';
    const label = L.marker([midLat,midLng],{
      icon:L.divIcon({
        className:'dist-label',
        html:`<span style="background:rgba(255,255,255,.95);padding:2px 6px;border-radius:4px;font-size:12px;color:#333;font-weight:700;white-space:nowrap;border:1.5px solid ${lineColor};box-shadow:0 1px 3px rgba(0,0,0,.2);pointer-events:none">${distText}</span>`,
        iconSize:[0,0],iconAnchor:[0,0]
      }),
      interactive:false,
      zIndexOffset:1000
    }).addTo(map);
    labelMarkers.push(label);
  });

  document.getElementById('empty-msg').style.display = 'none';
  const hdr = document.getElementById('result-header');
  hdr.style.display = '';
  hdr.textContent = `${school.name} → 의료기관 (${showDists.length}개)`;

  const list = document.getElementById('result-list');
  list.innerHTML = '';
  showDists.forEach((item,rank)=>{
    const li = document.createElement('li');
    li.className = 'result-item';
    li.innerHTML = `
      <span class="result-name">${rank+1}. ${item.name}</span>
      <span class="result-type">${item.type}</span>
      <span class="result-dist">${item.dist.toFixed(2)} km</span>
    `;
    li.addEventListener('click',()=>{
      map.flyTo([item.lat,item.lng],15,{duration:0.5});
    });
    li.addEventListener('mouseenter',()=>{
      if(activeLines[rank]) activeLines[rank].setStyle({weight:5,opacity:1});
    });
    li.addEventListener('mouseleave',()=>{
      if(activeLines[rank]) activeLines[rank].setStyle({weight:2.5,opacity:0.8});
    });
    list.appendChild(li);
  });

  const bounds = L.latLngBounds([[school.lat,school.lng]]);
  showDists.slice(0,5).forEach(item=>{
    bounds.extend([item.lat,item.lng]);
  });
  map.flyToBounds(bounds.pad(0.3),{duration:0.5});
}

document.querySelectorAll('[data-school-level],[data-med-group],#healthCheckOnly').forEach(cb=>{
  cb.addEventListener('change',()=>{
    renderMarkers();
    if(selectedSchool !== null) selectSchool(selectedSchool);
  });
});
document.getElementById('topN').addEventListener('change',()=>{
  if(selectedSchool !== null) selectSchool(selectedSchool);
});
document.getElementById('show1km').addEventListener('change',()=>{
  if(selectedSchool !== null) selectSchool(selectedSchool);
});
document.getElementById('show3km').addEventListener('change',()=>{
  if(selectedSchool !== null) selectSchool(selectedSchool);
});

map.on('click',(e)=>{
  if(!e.originalEvent.target.closest('.leaflet-marker-icon')) clearSelection();
});

function toggleSidebar(){
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('collapsed');
  setTimeout(()=>map.invalidateSize(),350);
}

renderMarkers();

const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

function doSearch(query){
  searchResults.innerHTML = '';
  if(!query || query.length < 1){searchResults.style.display='none';return;}
  const q = query.toLowerCase();
  const matches = [];

  DATA.schools.forEach((s,i)=>{
    if(s.name.toLowerCase().includes(q)){
      matches.push({name:s.name, tag:s.level, tagColor:SCHOOL_COLORS[s.level]||'#2563eb', type:'school', idx:i, lat:s.lat, lng:s.lng});
    }
  });
  DATA.medical.forEach((m,i)=>{
    if(m.name.toLowerCase().includes(q)){
      matches.push({name:m.name, tag:m.type, tagColor:MED_COLORS[m.type]||'#f97316', type:'medical', idx:i, lat:m.lat, lng:m.lng});
    }
  });

  if(matches.length===0){
    searchResults.innerHTML='<li style="color:#aaa;pointer-events:none">검색 결과 없음</li>';
    searchResults.style.display='block';
    return;
  }

  matches.slice(0,20).forEach(item=>{
    const li = document.createElement('li');
    li.innerHTML = `<span>${item.name}</span><span class="sr-tag" style="background:${item.tagColor}">${item.tag}</span>`;
    li.addEventListener('click',()=>{
      searchResults.style.display='none';
      searchInput.value = item.name;
      map.flyTo([item.lat,item.lng],16,{duration:0.5});
      if(item.type==='school') selectSchool(item.idx);
    });
    searchResults.appendChild(li);
  });
  if(matches.length>20){
    searchResults.innerHTML += `<li style="color:#aaa;pointer-events:none;font-size:12px">외 ${matches.length-20}건 더...</li>`;
  }
  searchResults.style.display='block';
}

searchInput.addEventListener('input',(e)=>doSearch(e.target.value.trim()));
searchInput.addEventListener('focus',()=>{if(searchInput.value.trim()) doSearch(searchInput.value.trim());});
document.addEventListener('click',(e)=>{
  if(!e.target.closest('.search-box')) searchResults.style.display='none';
});
</script>
</body>
</html>
